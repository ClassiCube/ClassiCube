name: Build latest (RPI)
# trigger via either push to selected branches or on manual run
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-rpi
  cancel-in-progress: true

jobs:
#============================================
# ================ 32 BIT RPI ===============
# ===========================================
  build-RPI32:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-armv6-lts
    steps:
      - uses: actions/checkout@v5

      - name: Retrieve OpenGL and X11 dev files
        run: |
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/rpi32.zip
          unzip rpi32.zip -d rpi

      - name: Compile RPI 32 bit build
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          export EXTRA_CFLAGS="-fno-stack-protector $LATEST_FLAG"
          export EXTRA_LDFLAGS="-s -L rpi/lib -Wl,--unresolved-symbols=ignore-in-shared-libs"

          make rpi RELEASE=1 TARGET=cc-rpi32
          
          
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-rpi32'
          DEST_NAME: 'cc-rpi32'
          
          
      - uses: ./.github/actions/notify_success
        with:
          DESTINATION_URL: '${{ secrets.NOTIFY_URL }}'
          WORKFLOW_NAME: 'rpi32'


      - uses: ./.github/actions/notify_failure
        if: failure()
        with:
          NOTIFY_MESSAGE: 'Failed to produce RPI 32 bit build'
          WEBHOOK_URL: '${{ secrets.WEBHOOK_URL }}'


#============================================
# ================ 64 BIT RPI ===============
# ===========================================
  build-RPI64:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    container:
      image: dockcross/linux-arm64-lts
    steps:
      - uses: actions/checkout@v5

      - name: Retrieve OpenGL and X11 dev files
        run: |
          wget https://github.com/ClassiCube/rpi-compiling-stuff/raw/main/rpi64.zip
          unzip rpi64.zip -d rpi

      - name: Compile RPI 64 bit build
        run: |
          LATEST_FLAG=-DCC_COMMIT_SHA=\\\"${GITHUB_SHA::9}\\\"

          export EXTRA_CFLAGS="-fno-stack-protector $LATEST_FLAG"
          export EXTRA_LDFLAGS="-s -L rpi/lib -Wl,--unresolved-symbols=ignore-in-shared-libs"

          make rpi RELEASE=1 TARGET=cc-rpi64
          
          
      - uses: ./.github/actions/upload_build
        with:
          SOURCE_FILE: 'cc-rpi64'
          DEST_NAME: 'cc-rpi64'
          
          
      - uses: ./.github/actions/notify_success
        with:
          DESTINATION_URL: '${{ secrets.NOTIFY_URL }}'
          WORKFLOW_NAME: 'rpi64'


      - uses: ./.github/actions/notify_failure
        if: failure()
        with:
          NOTIFY_MESSAGE: 'Failed to produce RPI 64 bit build'
          WEBHOOK_URL: '${{ secrets.WEBHOOK_URL }}'
